<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KakiMoni - Layout Controller</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #0a0a14;
  --surface: #111827;
  --surf2:   #1e293b;
  --surf3:   #0f172a;
  --border:  #1f2937;
  --border2: #374151;
  --text:    #e2e8f0;
  --muted:   #6b7280;
  --accent:  #f59e0b;
  --green:   #22c55e;
  --red:     #ef4444;
  --indigo:  #4f46e5;
}
html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; font-size: 14px; }

/* topbar */
#topbar {
  height: 44px; flex-shrink: 0;
  display: flex; align-items: center; gap: 12px; padding: 0 14px;
  background: #060912; border-bottom: 1px solid var(--border);
}
#topbar h1 { font-size: 0.95rem; color: var(--accent); white-space: nowrap; }
#conn-dot { font-size: 0.78rem; color: var(--muted); }
#conn-dot.ok { color: var(--green); }
.spacer { flex: 1; }
#group-sel-input {
  width: 80px; padding: 4px 8px; background: var(--surf2);
  border: 1px solid var(--border2); color: var(--text);
  border-radius: 4px; font-size: 0.85rem; outline: none;
}
#group-sel-input:focus { border-color: var(--accent); }

/* layout */
#app { display: flex; flex-direction: column; height: calc(100vh - 44px); }

/* right panel first (top), left panel second (bottom) */
#right-panel { order: 1; }
#left-panel  { order: 2; }

/* left panel: horizontal strip at bottom (max 10 cards) */
#left-panel {
  flex: 0 0 152px; width: 100%; overflow: hidden;
  padding: 5px 10px 0; display: flex; flex-direction: column; gap: 4px;
  border-top: 1px solid var(--border);
}
#left-panel h2 {
  font-size: 0.65rem; color: var(--muted); letter-spacing: 0.08em;
  flex-shrink: 0; white-space: nowrap; line-height: 1.4;
}
#seats-grid {
  display: flex; gap: 5px; overflow-x: auto; overflow-y: hidden;
  flex: 1; min-height: 0; padding-bottom: 6px;
  scrollbar-width: thin; scrollbar-color: var(--border2) transparent;
}
.seat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 4px; overflow: hidden;
  width: 130px; flex-shrink: 0;
}
.seat-header {
  display: flex; align-items: center; gap: 5px;
  padding: 4px 8px; background: var(--surf2); border-bottom: 1px solid var(--border);
  font-size: 0.72rem;
}
.seat-num {
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--red); display: flex; align-items: center; justify-content: center;
  font-weight: bold; font-size: 0.65rem; flex-shrink: 0;
}
.seat-num.on { background: var(--green); }
.seat-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #94a3b8; }
.seat-cw { position: relative; background: #fff; aspect-ratio: 16/9; overflow: hidden; }
.seat-canvas { width: 100%; height: 100%; display: block; }
.seat-placeholder {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  background: rgba(5,5,18,0.7); color: #374151; font-size: 0.75rem; pointer-events: none;
}
.seat-card.connected .seat-placeholder { display: none; }
.seat-card:not(.connected) { opacity: 0.45; }
#empty-msg { color: #374151; font-size: 0.8rem; padding: 8px; }

/* right panel 2-col */
#right-panel {
  flex: 1 1 0; min-height: 0; width: 100%;
  background: var(--surf3); display: flex; flex-direction: row;
}
#rp-canvas-col {
  flex: 3 1 0; min-width: 0; overflow: hidden;
  padding: 10px; display: flex; flex-direction: column; gap: 8px;
  border-right: 1px solid var(--border);
}
#rp-ctrl-col {
  flex: 0 0 auto; width: 300px; overflow: hidden;
  padding: 8px; display: flex; flex-direction: column;
  gap: 6px;
}
#lc-grid-section { display: flex; flex-direction: column; gap: 8px; }
#lc-grid-ctrl, #lc-free-ctrl, #ctrl-apply, #ctrl-patterns {
  display: flex; flex-direction: column; gap: 6px;
}
/* ctrl col section separators */
#rp-ctrl-col > * { padding: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; }
#ctrl-patterns { flex: 1; min-height: 0; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }
.rp-title {
  font-size: 0.72rem; font-weight: bold; color: var(--muted); letter-spacing: 0.05em;
}
.row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
label { font-size: 0.75rem; color: var(--muted); white-space: nowrap; }
input[type=number], select, input[type=text] {
  padding: 5px 8px; background: var(--surf2); border: 1px solid var(--border2);
  color: var(--text); border-radius: 4px; font-size: 0.8rem; outline: none; min-width: 0;
}
input[type=number] { width: 56px; text-align: center; }
input[type=number]:focus, input[type=text]:focus, select:focus { border-color: var(--accent); }

/* mode toggle */
#layout-mode-toggle {
  display: flex; border: 1px solid var(--border2);
  border-radius: 4px; overflow: hidden;
}
.layout-mode-btn {
  flex: 1; padding: 7px 10px; background: var(--surf2); border: none;
  color: var(--muted); cursor: pointer; font-size: 0.82rem; font-weight: bold;
  transition: background 0.15s; white-space: nowrap;
}
.layout-mode-btn.active { background: var(--indigo); color: #fff; }

#lc-mode-ctrl-canvas {
  display: flex; align-items: center; gap: 8px; flex-wrap: nowrap;
  flex-shrink: 0; overflow: hidden;
}
#lc-mode-ctrl-canvas #layout-mode-toggle { flex-shrink: 0; }
#lc-mode-ctrl-canvas #lc-presets { display: flex; gap: 5px; flex-wrap: nowrap; overflow: hidden; }
#lc-presets.disabled { opacity: 0.35; pointer-events: none; }
.lc-preset-btn {
  padding: 3px 9px; background: #2d2d4a; border: 1px solid var(--border2);
  color: #94a3b8; cursor: pointer; font-size: 0.78rem; border-radius: 3px;
}
.lc-preset-btn:hover { background: var(--border2); color: var(--text); }
.lc-preset-btn.active { background: var(--indigo); border-color: #6d28d9; color: #fff; }

#btn-rebuild {
  padding: 4px 10px; background: var(--surf2); border: 1px solid var(--border2);
  color: var(--muted); border-radius: 3px; cursor: pointer; font-size: 0.75rem;
}
#btn-rebuild:hover { background: var(--border2); }
#lc-keep-ratio-wrap {
  font-size: 0.75rem; color: var(--muted);
  display: flex; align-items: center; gap: 5px; cursor: pointer; white-space: nowrap;
}

/* grid preview */
#grid-preview {
  display: grid; gap: 4px;
  background: #1a1a2e; border: 1px solid var(--border2);
  border-radius: 4px; padding: 4px; aspect-ratio: 16/9;
  /*
   * 高さ制限: 100vh - topbar(44) - bottom-strip(152) - presets+controls+padding(110)
   * 幅制限: 高さ制限 * 16/9 (はみ出さないよう両方設定)
   */
  max-height: calc(100vh - 306px);
  max-width: min(100%, calc((100vh - 306px) * 16 / 9));
  width: 100%;
  align-self: flex-start;
}
.gc {
  background: #0d0d1a; border: 2px solid var(--border2);
  border-radius: 3px; display: flex; align-items: center; justify-content: center;
  font-size: 0.65rem; color: var(--muted); cursor: pointer;
  transition: background 0.1s; position: relative; overflow: hidden;
}
.gc:hover { border-color: #6b7280; }
.gc.assigned { background: #1e3a5f; border-color: var(--indigo); color: #93c5fd; font-weight: bold; }
.gc select {
  position: absolute; inset: 0; width: 100%; height: 100%;
  opacity: 0; cursor: pointer; font-size: 0.7rem;
}
.gc.keep-ratio { background: #111 !important; }
.gc.keep-ratio.assigned { background: #0d1f30 !important; }
.gc-label { pointer-events: none; font-size: 0.72rem; background: rgba(0,0,0,0.55); padding: 2px 5px; border-radius: 2px; }
/* コンパネプレビューの選択肢オーバーレイ */
.lc-choice-overlay {
  display: none; position: absolute; inset: 0; z-index: 12;
  align-items: center; justify-content: center; pointer-events: none;
}
.lc-choice-overlay.show { display: flex; }
.lc-choice-overlay img { width: 100%; height: 100%; object-fit: contain; }
/* コンパネプレビューの判定オーバーレイ */
.lc-judge-overlay {
  display: none; position: absolute; inset: 0; z-index: 20;
  align-items: center; justify-content: center; pointer-events: none;
}
.lc-judge-overlay.show { display: flex; }
.lc-judge-overlay img { max-width: 80%; max-height: 80%; object-fit: contain; }

/* free mode */
#lc-free-section { display: none; flex-direction: column; gap: 6px; flex: 1; min-height: 0; }
#lc-free-section.active { display: flex; }

/* canvas + bg-picker 横並びラッパー */
#free-canvas-row {
  display: flex; flex-direction: row; gap: 8px;
  flex: 1; min-height: 0; align-items: flex-start;
}

#free-canvas-wrap {
  position: relative; min-width: 0;
  width: 100%; aspect-ratio: 16/9;
  /*
   * 高さ制限: 100vh - topbar(44) - bottom-strip(152) - detail-bar+bg+padding(90)
   * 幅制限: 高さ制限 * 16/9
   */
  max-height: calc(100vh - 286px);
  max-width: min(100%, calc((100vh - 286px) * 16 / 9));
  background: #050510; border: 1px solid var(--border2); border-radius: 3px;
  overflow: hidden; align-self: flex-start;
}
#free-canvas { position: absolute; inset: 0; width: 100%; height: 100%; }

.free-cell {
  position: absolute; border: 2px solid var(--indigo);
  background: rgba(15,20,50,0.7); cursor: move;
  -webkit-user-select: none; user-select: none;
  min-width: 4%; min-height: 6%;
}
.free-cell.selected, .free-cell.multi-selected {
  border-color: #34d399 !important;
  border-style: solid !important;
  box-shadow: 0 0 0 2px #34d39980, 0 0 8px #34d39960 !important;
}
.free-cell.text-only {
  background: transparent;
  border: 2px dashed #f59e0b80;
}
.free-cell.text-only:hover {
  border-color: #f59e0b;
  border-style: dashed;
}
.free-cell.text-only.selected, .free-cell.text-only.multi-selected {
  border-color: #34d399 !important;
  border-style: dashed !important;
  box-shadow: 0 0 0 2px #34d39980, 0 0 8px #34d39960 !important;
}
.free-cell.text-only .free-cell-toolbar {
  position: absolute; top: -20px; left: 0; right: 0; height: 18px;
  background: rgba(245,158,11,0.85);
  border-radius: 3px 3px 0 0;
  opacity: 0;
  transition: opacity 0.15s;
}
.free-cell.text-only:hover .free-cell-toolbar,
.free-cell.text-only.selected .free-cell-toolbar { opacity: 1; }
.free-cell.text-only .free-cell-pos-badge { display: none; }
#rubber-band {
  position: absolute;
  border: 1px dashed #a78bfa;
  background: rgba(99,102,241,0.12);
  pointer-events: none;
  z-index: 50;
  box-sizing: border-box;
}
.free-cell-toolbar {
  position: absolute; top: 0; left: 0; right: 0; z-index: 5;
  display: flex; align-items: center; gap: 3px; padding: 2px 4px;
  background: rgba(0,0,0,0.7);
}
.free-cell-seat-sel {
  flex: 1; min-width: 0; background: transparent; border: none;
  color: #a5b4fc; font-size: 0.68rem; font-weight: bold; outline: none; cursor: pointer;
}
.free-cell-del {
  background: none; border: none; color: var(--red);
  cursor: pointer; font-size: 0.72rem; padding: 0 2px; line-height: 1; flex-shrink: 0;
}
.free-cell-pos-badge {
  position: absolute; top: 22px; left: 0; right: 0;
  font-size: 0.55rem; color: rgba(165,180,252,0.75);
  background: rgba(0,0,0,0.5); padding: 1px 4px;
  pointer-events: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.5;
}
/* resize handles */
.rh {
  position: absolute; width: 9px; height: 9px;
  background: var(--indigo); border: 1px solid #a5b4fc;
  border-radius: 1px; z-index: 10;
}
.rh.anchor-active { background: #f59e0b; border-color: #fcd34d; box-shadow: 0 0 4px #f59e0b80; }
.rh-nw { top:-5px; left:-5px;   cursor:nw-resize; }
.rh-n  { top:-5px; left:calc(50% - 4px); cursor:n-resize; }
.rh-ne { top:-5px; right:-5px;  cursor:ne-resize; }
.rh-e  { top:calc(50% - 4px); right:-5px; cursor:e-resize; }
.rh-se { bottom:-5px; right:-5px; cursor:se-resize; }
.rh-s  { bottom:-5px; left:calc(50% - 4px); cursor:s-resize; }
.rh-sw { bottom:-5px; left:-5px;  cursor:sw-resize; }
.rh-w  { top:calc(50% - 4px); left:-5px;  cursor:w-resize; }

/* text overlay in free cell editor preview */
.free-cell-text-wrap {
  position: absolute; inset: 0; z-index: 4;
  display: flex; flex-direction: column;
  pointer-events: none; overflow: hidden; padding: 2px;
}
/* 席パネルのテキスト: 小さめ */
.free-cell-text-label {
  padding: 1px 3px; line-height: 1.2; word-break: break-word;
  white-space: pre-wrap; max-width: 100%; font-size: 7px;
}
/* テキスト専用パネルのテキスト: 実際の表示に近い大きさ */
.text-only .free-cell-text-label {
  font-size: 0.9em;
  padding: 2px 6px;
}
/* text input in cell toolbar */
.free-cell-text-input {
  flex: 1; min-width: 0; max-width: 58px;
  background: transparent; border: none;
  color: #fbbf24; font-size: 0.63rem; outline: none; padding: 0 2px;
  overflow: hidden;
}
.free-cell-text-input::placeholder { color: #374151; }
/* text inspector section */
.fci-text-sep {
  width: 100%; height: 1px; background: var(--border); margin: 3px 0;
}
.fci-color-inp {
  width: 22px; height: 18px; padding: 0; border: 1px solid var(--border2);
  border-radius: 2px; cursor: pointer; background: none; flex-shrink: 0;
}
.fci-valign-btn, .fci-halign-btn {
  padding: 1px 4px; font-size: 0.62rem; background: var(--surf2);
  border: 1px solid var(--border2); color: var(--muted); cursor: pointer; border-radius: 2px;
  line-height: 1.4;
}
.fci-valign-btn.active, .fci-halign-btn.active { background: var(--indigo); color: #fff; border-color: #818cf8; }

/* detail bar */
#free-detail-bar {
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  font-size: 0.95rem; color: #94a3b8;
  padding: 6px 14px; background: #0a0a1a;
  border: 1px solid #2d2d4a; border-radius: 4px; min-height: 34px;
}
#free-detail-bar .fdb-placeholder { visibility: hidden; font-size: 0.88rem; }
#free-detail-bar .fdb-name { color: #a5b4fc; font-weight: bold; font-size: 1rem; }
#free-detail-bar .fdb-kv { color: #6b7280; font-size: 0.88rem; }
#free-detail-bar .fdb-kv span { color: var(--text); font-size: 1rem; font-weight: bold; }

/* inspector */
#free-cell-inspector {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 8px; background: #0a0a1a;
  border: 1px solid #2d2d4a; border-radius: 3px; min-height: 34px; flex-wrap: wrap;
}
#fci-title { color: var(--muted); font-size: 0.72rem; white-space: nowrap; min-width: 60px; }
#fci-inputs { display: flex; gap: 4px; flex: 1; flex-wrap: wrap; align-items: center; min-width: 0; }
.fci-group { display: flex; align-items: center; gap: 3px; }
.fci-label { color: var(--muted); font-size: 0.68rem; white-space: nowrap; }
.fci-inp {
  width: 52px; background: var(--surf2); border: 1px solid var(--border2);
  color: var(--text); font-size: 0.75rem; padding: 2px 4px;
  border-radius: 2px; outline: none; text-align: right;
  -moz-appearance: textfield; appearance: textfield;
}
.fci-inp::-webkit-inner-spin-button,
.fci-inp::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
.fci-inp:focus { border-color: var(--indigo); }
#fci-lock-wrap {
  display: flex; align-items: center; gap: 4px;
  color: #94a3b8; font-size: 0.68rem; cursor: pointer;
  -webkit-user-select: none; user-select: none;
  white-space: nowrap; margin-left: 2px;
}
#fci-lock-wrap input { cursor: pointer; accent-color: var(--indigo); }
#fci-anchor {
  display: grid; grid-template-columns: repeat(3, 9px); gap: 2px; flex-shrink: 0;
}
.fci-anchor-dot {
  width: 9px; height: 9px; border: none; border-radius: 1px;
  background: var(--border2); cursor: pointer; padding: 0;
}
.fci-anchor-dot.active { background: var(--indigo); }
#free-cell-inspector.no-selection #fci-inputs,
#free-cell-inspector.no-selection + #fci-text-section {
  opacity: 0.25; pointer-events: none;
}

/* BG picker — 縦並びサイドバー */
#free-bg-picker {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  padding: 8px 6px; background: #0a0a1a;
  border: 1px solid #2d2d4a; border-radius: 3px;
  width: 88px; flex-shrink: 0; overflow-y: auto; max-height: 100%;
  scrollbar-width: thin; scrollbar-color: var(--border2) transparent;
}
#free-bg-picker-label {
  font-size: 0.65rem; color: #4b5563; white-space: nowrap;
  align-self: flex-start; margin-bottom: 2px;
}
#free-bg-thumbs { display: flex; flex-direction: column; gap: 6px; align-items: center; }
.bg-thumb {
  width: 72px; height: 41px; flex-shrink: 0;
  border: 2px solid var(--border2); border-radius: 3px;
  background-size: cover; background-position: center;
  cursor: pointer; padding: 0; display: block;
}
.bg-thumb.selected { border-color: #f59e0b; box-shadow: 0 0 5px #f59e0b80; }
.bg-thumb:hover:not(.selected) { border-color: #6b7280; }
#free-bg-none {
  font-size: 0.7rem; color: #6b7280; background: var(--surf2);
  border: 1px solid var(--border2); border-radius: 2px;
  padding: 4px 0; cursor: pointer; width: 72px; text-align: center;
  white-space: nowrap; line-height: 1.6;
}
#free-bg-none.selected { border-color: #f59e0b; color: #f59e0b; }
#free-bg-none:hover:not(.selected) { border-color: #6b7280; }

/* add panel btn */
#btn-add-free-cell {
  flex: 1; padding: 6px; background: linear-gradient(180deg, #3b3270, #312a5f);
  border: none; color: #a78bfa;
  cursor: pointer; font-size: 0.8rem; font-weight: bold; border-radius: 3px;
  box-shadow: 0 3px 0 rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.12);
  transition: opacity 0.1s, box-shadow 0.1s, transform 0.1s;
}
#btn-add-free-cell:hover { opacity: 0.92; box-shadow: 0 2px 0 rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.12); transform: translateY(1px); }
#btn-add-free-cell:active { box-shadow: 0 1px 0 rgba(0,0,0,0.45), inset 0 2px 4px rgba(0,0,0,0.3); transform: translateY(2px); }
#btn-add-text-cell {
  flex: 1; padding: 6px; background: linear-gradient(180deg, #3d2f0d, #31250a);
  border: none; color: #fbbf24;
  cursor: pointer; font-size: 0.8rem; font-weight: bold; border-radius: 3px;
  box-shadow: 0 3px 0 rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.10);
  transition: opacity 0.1s, box-shadow 0.1s, transform 0.1s;
}
#btn-add-text-cell:hover { opacity: 0.92; box-shadow: 0 2px 0 rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.10); transform: translateY(1px); }
#btn-add-text-cell:active { box-shadow: 0 1px 0 rgba(0,0,0,0.45), inset 0 2px 4px rgba(0,0,0,0.3); transform: translateY(2px); }
.free-cell.text-only { border-color: #f59e0b; }
#fci-text-section {
  border: 1px solid #374151;
  border-radius: 6px;
  padding: 8px;
  background: #1e293b;
}
#fci-text-section .rp-title { color: #fbbf24; }
#add-btns-group {
  display: flex;
  flex-direction: row;
  gap: 6px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
  margin-top: 4px;
}

/* save slots */
.free-save-row {
  display: flex; align-items: center; gap: 4px; margin-bottom: 4px;
}
.free-save-row:last-child { margin-bottom: 0; }
.free-save-num { font-size: 0.65rem; color: #4b5563; min-width: 14px; }
.free-save-name {
  flex: 1; background: var(--surf2); border: 1px solid #2d2d4a;
  color: #94a3b8; font-size: 0.7rem; padding: 2px 5px; border-radius: 2px; outline: none;
}
.free-save-name.has-data { border-color: var(--indigo); color: #a5b4fc; }
.free-save-name:focus { border-color: var(--indigo); }
.free-save-btn {
  padding: 2px 7px; font-size: 0.68rem; border: none;
  border-radius: 2px; cursor: pointer; white-space: nowrap; line-height: 1.5;
}
.free-save-btn-save { background: #1e3a5f; color: #60a5fa; }
.free-save-btn-load { background: var(--surf2); color: #94a3b8; }
.free-save-btn-del  { background: #2d0f0f; color: var(--red); }
.free-save-btn:hover:not(:disabled) { opacity: 0.8; }

<script>
// ================================================================
// Constants & global state
// ================================================================
const PAT_KEY   = 'lc_patterns_v1';
const PAT_COUNT = 10;
const DISP_W = 1920, DISP_H = 1080;

const seats = new Map();
const currentStrokes = new Map();
let socket = null;

// grid mode
let layoutRows = 2, layoutCols = 3;
let layoutKeepRatio = false;
let cellAssignments = [];

const LAYOUT_PRESETS = [
  { label:'1x1', rows:1, cols:1 },
  { label:'1x2', rows:1, cols:2 },
  { label:'2x2', rows:2, cols:2 },
  { label:'2x3', rows:2, cols:3 },
  { label:'3x3', rows:3, cols:3 },
  { label:'3x4', rows:3, cols:4 },
  { label:'4x4', rows:4, cols:4 },
  { label:'5x2', rows:2, cols:5 },
];

// free mode
let freeCells = [];
let freeBgUrl = null;
let freeCellIdCounter = 0;
let selectedCellId = null;
let activeCellEl   = null;
let selectedCellIds = new Set();
let aspectLockEnabled = false;
let anchorPoint = 'tl';
const ANCHOR_FACTORS = {
  tl:[0,0],   tc:[0.5,0],   tr:[1,0],
  ml:[0,0.5], mc:[0.5,0.5], mr:[1,0.5],
  bl:[0,1],   bc:[0.5,1],   br:[1,1],
};
const ANCHOR_TO_DIR = {
  tl:'nw', tc:'n', tr:'ne',
  ml:'w',  mc:null, mr:'e',
  bl:'sw', bc:'s', br:'se'
};

let layoutMode = 'grid';
let _bgFiles = null;
let lcCurrentChoiceUrl = null;

function applyLcChoice(url) {
  lcCurrentChoiceUrl = url;
  // グリッド割当セル
  document.querySelectorAll('.gc.assigned').forEach(cell => {
    let ov = cell.querySelector('.lc-choice-overlay');
    if (!ov) {
      ov = document.createElement('div'); ov.className = 'lc-choice-overlay';
      const img = document.createElement('img'); img.alt = ''; ov.appendChild(img);
      cell.appendChild(ov);
    }
    ov.querySelector('img').src = url; ov.classList.add('show');
  });
  // フリーモード・子機割当済みセルのみ（未割当・テキスト専用はスキップ）
  document.querySelectorAll('.free-cell.fc-has-seat').forEach(cell => {
    let ov = cell.querySelector('.lc-choice-overlay');
    if (!ov) {
      ov = document.createElement('div'); ov.className = 'lc-choice-overlay';
      const img = document.createElement('img'); img.alt = ''; ov.appendChild(img);
      cell.appendChild(ov);
    }
    ov.querySelector('img').src = url; ov.classList.add('show');
  });
  // 子機プレビュー（左下エリア）
  document.querySelectorAll('.seat-cw').forEach(cw => {
    let ov = cw.querySelector('.lc-choice-overlay');
    if (!ov) {
      ov = document.createElement('div'); ov.className = 'lc-choice-overlay';
      const img = document.createElement('img'); img.alt = ''; ov.appendChild(img);
      cw.appendChild(ov);
    }
    ov.querySelector('img').src = url; ov.classList.add('show');
  });
}
function clearLcChoice() {
  lcCurrentChoiceUrl = null;
  document.querySelectorAll('.lc-choice-overlay').forEach(ov => ov.classList.remove('show'));
}
function applyLcJudgeOverlay(seatId, url) {
  const addOverlay = (wrap) => {
    if (!wrap) return;
    let ov = wrap.querySelector('.lc-judge-overlay');
    if (!ov) {
      ov = document.createElement('div'); ov.className = 'lc-judge-overlay';
      const img = document.createElement('img'); img.alt = ''; ov.appendChild(img);
      wrap.appendChild(ov);
    }
    ov.querySelector('img').src = url; ov.classList.add('show');
  };
  const seat = seats.get(String(seatId));
  if (seat?.canvas) addOverlay(seat.canvas.parentElement);
  const previews = seatPreviewCanvases.get(String(seatId));
  if (previews) for (const c of previews) if (c.isConnected) addOverlay(c.parentElement);
}
function clearLcJudgeOverlay(seatId) {
  if (seatId != null) {
    const seat = seats.get(String(seatId));
    if (seat?.canvas) { const ov = seat.canvas.parentElement.querySelector('.lc-judge-overlay'); if (ov) ov.classList.remove('show'); }
    const previews = seatPreviewCanvases.get(String(seatId));
    if (previews) for (const c of previews) if (c.isConnected) { const ov = c.parentElement.querySelector('.lc-judge-overlay'); if (ov) ov.classList.remove('show'); }
  } else {
    document.querySelectorAll('.lc-judge-overlay').forEach(ov => ov.classList.remove('show'));
  }
}

const seatPreviewCanvases = new Map(); // seatId -> Set<HTMLCanvasElement>
function addPreviewCanvas(seatId, canvas) {
  if (!seatPreviewCanvases.has(seatId)) seatPreviewCanvases.set(seatId, new Set());
  seatPreviewCanvases.get(seatId).add(canvas);
}
function removePreviewCanvas(canvas) {
  for (const set of seatPreviewCanvases.values()) set.delete(canvas);
}
function fitPreviewCanvas(canvas, cellEl) {
  const cw = cellEl.clientWidth, ch = cellEl.clientHeight;
  if (!cw || !ch) return;
  let w, h;
  if (cw / ch > 16 / 9) { h = ch; w = Math.round(h * 16 / 9); }
  else { w = cw; h = Math.round(w * 9 / 16); }
  canvas.style.width  = w + 'px';
  canvas.style.height = h + 'px';
  canvas.style.left   = Math.round((cw - w) / 2) + 'px';
  canvas.style.top    = Math.round((ch - h) / 2) + 'px';
}
function drawPreviewCanvas(previewCanvas, seat) {
  const w = previewCanvas.offsetWidth, h = previewCanvas.offsetHeight;
  if (!w || !h) return;
  const dpr = window.devicePixelRatio || 1;
  previewCanvas.width  = Math.round(w * dpr);
  previewCanvas.height = Math.round(h * dpr);
  previewCanvas.style.width  = w + 'px';
  previewCanvas.style.height = h + 'px';
  const pctx = previewCanvas.getContext('2d');
  pctx.setTransform(1, 0, 0, 1, 0, 0);
  pctx.scale(dpr, dpr);
  pctx.fillStyle = '#ffffff';
  pctx.fillRect(0, 0, w, h);
  if (seat.bgImage) {
    const img = seat.bgImage;
    const scale = Math.max(w / img.naturalWidth, h / img.naturalHeight);
    const dw = img.naturalWidth * scale, dh = img.naturalHeight * scale;
    pctx.drawImage(img, (w - dw) / 2, (h - dh) / 2, dw, dh);
  }
  if (seat.fillImg) {
    pctx.drawImage(seat.fillImg, 0, 0, w, h);
  }
  const inv = lcJudgeColorMode && seat.judging;
  for (const s of seat.strokes) drawStrokeOnCanvas(previewCanvas, pctx, s, inv);
}
function updateSeatPreviews(seat) {
  const previews = seatPreviewCanvases.get(seat.id);
  if (!previews) return;
  for (const c of [...previews]) {
    if (!c.isConnected) { previews.delete(c); continue; }
    drawPreviewCanvas(c, seat);
  }
}
function updateSeatPreviewsSegment(seat, stroke) {
  const previews = seatPreviewCanvases.get(seat.id);
  if (!previews) return;
  const inv = lcJudgeColorMode && seat.judging;
  for (const c of [...previews]) {
    if (!c.isConnected) { previews.delete(c); continue; }
    const pctx = c.getContext('2d');
    drawStrokeSegment(c, pctx, stroke, inv);
  }
}
// ================================================================
function toPxX(pct) { return Math.round(pct / 100 * DISP_W); }
function toPxY(pct) { return Math.round(pct / 100 * DISP_H); }
function fromPxX(px) { return px / DISP_W * 100; }
function fromPxY(py) { return py / DISP_H * 100; }

function anchorToDisplay(cell) {
  const [ax, ay] = ANCHOR_FACTORS[anchorPoint];
  return [
    Math.round(toPxX(cell.x) + ax * toPxX(cell.w)),
    Math.round(toPxY(cell.y) + ay * toPxY(cell.h)),
  ];
}
function displayToTopLeft(dispX, dispY, cell) {
  const [ax, ay] = ANCHOR_FACTORS[anchorPoint];
  return [
    fromPxX(dispX - ax * toPxX(cell.w)),
    fromPxY(dispY - ay * toPxY(cell.h)),
  ];
}

// ================================================================
// Group selector
// ================================================================
// ================================================================
// Group toggle (B1 / B2 / 両方)
// ================================================================
let selectedGroups = ['slot1']; // 初期値

document.getElementById('group-toggle').addEventListener('click', (e) => {
  const btn = e.target.closest('.grp-btn');
  if (!btn) return;
  const g = btn.dataset.group;
  selectedGroups = g === 'both' ? ['slot1', 'slot2'] : [g];
  document.querySelectorAll('.grp-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.group === g)
  );
});

const groupInput = document.getElementById('group-sel-input');
const groupDisp  = document.getElementById('group-disp');
groupInput.addEventListener('input', () => {

function setLayoutMode(mode) {
  layoutMode = mode;
  document.getElementById('lmode-grid').classList.toggle('active', mode === 'grid');
  document.getElementById('lmode-free').classList.toggle('active', mode === 'free');
  document.getElementById('lc-grid-section').style.display = mode === 'grid' ? 'flex' : 'none';
  document.getElementById('lc-grid-ctrl').style.display    = mode === 'grid' ? 'flex' : 'none';
  document.getElementById('lc-free-section').style.display = mode === 'free' ? 'flex' : 'none';
  document.getElementById('lc-free-ctrl').style.display    = mode === 'free' ? 'flex' : 'none';
  document.getElementById('lc-presets').classList.toggle('disabled', mode === 'free');
}
document.getElementById('lmode-grid').addEventListener('click', () => setLayoutMode('grid'));
document.getElementById('lmode-free').addEventListener('click', () => {
  setLayoutMode('free');
  buildFreeEditor();
  loadBgPicker();
});

// ================================================================
// Grid mode
// ================================================================
function buildPresets() {
  const cont = document.getElementById('lc-presets');
  cont.innerHTML = '';
  for (const p of LAYOUT_PRESETS) {
    const btn = document.createElement('button');
    btn.className = 'lc-preset-btn' + (p.rows === layoutRows && p.cols === layoutCols ? ' active' : '');
    btn.textContent = p.label;
    btn.addEventListener('click', () => {
      layoutRows = p.rows; layoutCols = p.cols;
      cellAssignments = Array(layoutRows * layoutCols).fill(null);
      document.getElementById('rows').value = layoutRows;
      document.getElementById('cols').value = layoutCols;
      buildPresets();
      buildGridPreview();
    });
    cont.appendChild(btn);
  }
}

function buildGridPreview() {
  const total = layoutRows * layoutCols;
  cellAssignments = Array.from({ length: total }, (_, i) => cellAssignments[i] !== undefined ? cellAssignments[i] : null);

  const preview = document.getElementById('grid-preview');
  preview.style.gridTemplateRows    = 'repeat(' + layoutRows + ', 1fr)';
  preview.style.gridTemplateColumns = 'repeat(' + layoutCols + ', 1fr)';
  preview.innerHTML = '';

  const seatIds = [...seats.keys()].sort((a, b) => parseInt(a) - parseInt(b));

  for (let i = 0; i < total; i++) {
    const cell = document.createElement('div');
    cell.className = 'gc' + (layoutKeepRatio ? ' keep-ratio' : '');

    const previewC = document.createElement('canvas');
    previewC.style.cssText = layoutKeepRatio
      ? 'position:absolute;pointer-events:none;'
      : 'position:absolute;inset:0;width:100%;height:100%;pointer-events:none;';
    cell.appendChild(previewC);

    const lbl = document.createElement('span');
    lbl.className = 'gc-label';
    const curId = cellAssignments[i];
    lbl.textContent = curId ? ('ID ' + curId) : '-';
    if (curId) {
      cell.classList.add('assigned');
      addPreviewCanvas(curId, previewC);
      requestAnimationFrame(() => {
        if (layoutKeepRatio) fitPreviewCanvas(previewC, cell);
        const s = seats.get(curId); if (s) drawPreviewCanvas(previewC, s);
      });
    }
    cell.appendChild(lbl);

    const sel = document.createElement('select');
    const emptyOpt = document.createElement('option');
    emptyOpt.value = ''; emptyOpt.textContent = '-- なし --';
    sel.appendChild(emptyOpt);
    for (const id of seatIds) {
      const opt = document.createElement('option');
      opt.value = id; opt.textContent = 'ID ' + id;
      if (id === curId) opt.selected = true;
      sel.appendChild(opt);
    }
    sel.addEventListener('change', () => {
      removePreviewCanvas(previewC);
      previewC.getContext('2d').clearRect(0, 0, previewC.width, previewC.height);
      cellAssignments[i] = sel.value || null;
      lbl.textContent = sel.value ? ('ID ' + sel.value) : '-';
      cell.classList.toggle('assigned', !!sel.value);
      if (sel.value) {
        addPreviewCanvas(sel.value, previewC);
        const s = seats.get(sel.value);
        if (s) requestAnimationFrame(() => {
          if (layoutKeepRatio) fitPreviewCanvas(previewC, cell);
          drawPreviewCanvas(previewC, s);
        });
      }
    });
    cell.appendChild(sel);
    preview.appendChild(cell);
  }
  if (lcCurrentChoiceUrl) requestAnimationFrame(() => applyLcChoice(lcCurrentChoiceUrl));
}

document.getElementById('btn-rebuild').addEventListener('click', () => {
  layoutRows = parseInt(document.getElementById('rows').value) || 2;
  layoutCols = parseInt(document.getElementById('cols').value) || 3;
  buildPresets();
  buildGridPreview();
});
document.getElementById('rows').addEventListener('change', () => {
  layoutRows = parseInt(document.getElementById('rows').value) || 2;
  buildPresets(); buildGridPreview();
});
document.getElementById('cols').addEventListener('change', () => {
  layoutCols = parseInt(document.getElementById('cols').value) || 3;
  buildPresets(); buildGridPreview();
});

// ================================================================
// Free mode
// ================================================================
function getFreeCanvasRect() { return document.getElementById('free-canvas').getBoundingClientRect(); }

function buildFreeEditor() {
  // 古いプレビューcanvasを解除
  for (const cell of freeCells) {
    if (cell._previewCanvas) { removePreviewCanvas(cell._previewCanvas); cell._previewCanvas = null; }
  }
  const prevSelected = selectedCellId;
  const prevMultiSelected = new Set(selectedCellIds);
  activeCellEl = null; selectedCellId = null; selectedCellIds = new Set();
  const canvas = document.getElementById('free-canvas');
  canvas.innerHTML = '';
  for (const cell of freeCells) renderFreeCell(cell);
  if (prevSelected !== null) {
    const newEl = canvas.querySelector('[data-cell-id="' + prevSelected + '"]');
    if (newEl) {
      const c2 = freeCells.find(c => c.id === prevSelected);
      if (c2) selectFreeCell(c2, newEl, false, true);
    }
  }
  for (const id of prevMultiSelected) {
    if (id === prevSelected) continue;
    const el = canvas.querySelector('[data-cell-id="' + id + '"]');
    if (el) { el.classList.add('multi-selected'); selectedCellIds.add(id); }
  }
  if (lcCurrentChoiceUrl) requestAnimationFrame(() => applyLcChoice(lcCurrentChoiceUrl));
}

// キャンバス背景でのラバーバンド選択（初回1度だけ登録）
let _rubberBandInitialized = false;
function initFreeCanvasRubberBand() {
  if (_rubberBandInitialized) return;
  _rubberBandInitialized = true;
  const canvas = document.getElementById('free-canvas');
  canvas.addEventListener('mousedown', (e) => {
    if (e.target !== canvas) return; // セル or ハンドルをクリックした場合はスキップ
    e.preventDefault();
    if (!e.shiftKey) {
      canvas.querySelectorAll('.free-cell.selected,.free-cell.multi-selected')
        .forEach(el => el.classList.remove('selected', 'multi-selected'));
      selectedCellIds.clear(); selectedCellId = null; activeCellEl = null;
      document.getElementById('free-cell-inspector').classList.add('no-selection');
      document.getElementById('fci-title').textContent = 'パネルを選択';
      document.getElementById('free-detail-bar').innerHTML = '<span class="fdb-placeholder">-</span>';
    }
    // ラバーバンド開始
    const canvasRect = canvas.getBoundingClientRect();
    const startX = e.clientX - canvasRect.left;
    const startY = e.clientY - canvasRect.top;
    const rb = document.createElement('div');
    rb.id = 'rubber-band';
    rb.style.left = startX + 'px'; rb.style.top = startY + 'px';
    rb.style.width = '0'; rb.style.height = '0';
    canvas.appendChild(rb);
    let rbLeft = startX, rbTop = startY, rbRight = startX, rbBottom = startY;
    const onMove = (ev) => {
      const cx = ev.clientX - canvasRect.left;
      const cy = ev.clientY - canvasRect.top;
      rbLeft   = Math.min(cx, startX);
      rbTop    = Math.min(cy, startY);
      rbRight  = Math.max(cx, startX);
      rbBottom = Math.max(cy, startY);
      rb.style.left   = rbLeft + 'px';
      rb.style.top    = rbTop  + 'px';
      rb.style.width  = (rbRight  - rbLeft) + 'px';
      rb.style.height = (rbBottom - rbTop)  + 'px';
    };
    const onUp = () => {
      rb.remove();
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      const cw = canvasRect.width, ch = canvasRect.height;
      if (cw === 0 || ch === 0) return;
      // ラバーバンドをパーセントに換算
      const selL = rbLeft   / cw * 100;
      const selT = rbTop    / ch * 100;
      const selR = rbRight  / cw * 100;
      const selB = rbBottom / ch * 100;
      if (selR - selL < 1 && selB - selT < 1) return; // ほぼゼロ → 選択なし
      let first = true;
      for (const cell of freeCells) {
        // セルの中心がラバーバンド内にあれば選択
        const cx = cell.x + cell.w / 2;
        const cy = cell.y + cell.h / 2;
        if (cx >= selL && cx <= selR && cy >= selT && cy <= selB) {
          const domEl = canvas.querySelector('[data-cell-id="' + cell.id + '"]');
          if (!domEl) continue;
          if (first && !e.shiftKey) {
            // 最初のセルを primary selected に
            selectFreeCell(cell, domEl, false, true);
            first = false;
          } else {
            domEl.classList.add('multi-selected');
            selectedCellIds.add(cell.id);
          }
        }
      }
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  });
}

function buildSeatOptions(currentSeatId) {
  let opts = '<option value="">空</option>';
  const seatIds = [...seats.keys()].sort((a, b) => parseInt(a) - parseInt(b));
  for (const id of seatIds) {
    const seat = seats.get(id);
    const name = seat ? (seat.name || ('ID ' + id)) : ('ID ' + id);
    opts += '<option value="' + id + '"' + (currentSeatId == id ? ' selected' : '') + '>' + name + '</option>';
  }
  return opts;
}

function renderFreeCell(cell) {
  const canvas = document.getElementById('free-canvas');
  const el = document.createElement('div');
  el.className = 'free-cell';
  el.dataset.cellId = String(cell.id);
  el.style.left   = cell.x + '%';
  el.style.top    = cell.y + '%';
  el.style.width  = cell.w + '%';
  el.style.height = cell.h + '%';

  const previewC = document.createElement('canvas');
  previewC.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;pointer-events:none;';
  el.appendChild(previewC);
  cell._previewCanvas = previewC;
  if (cell.seatId) {
    el.classList.add('fc-has-seat');
    addPreviewCanvas(String(cell.seatId), previewC);
    const _s = seats.get(String(cell.seatId));
    if (_s) requestAnimationFrame(() => drawPreviewCanvas(previewC, _s));
  }

  const tb = document.createElement('div');
  tb.className = 'free-cell-toolbar';

  if (cell.textOnly) {
    // テキスト専用: ミニマルハンドルバー（ラベル＋削除のみ）
    el.classList.add('text-only');
    previewC.style.display = 'none';
    const lbl = document.createElement('span');
    lbl.textContent = '📝 テキスト';
    lbl.style.cssText = 'flex:1;font-size:0.65rem;color:#fff;font-weight:bold;padding-left:2px;';
    const del2 = document.createElement('button');
    del2.className = 'free-cell-del';
    del2.textContent = '✕';
    del2.style.color = '#fff';
    del2.addEventListener('mousedown', e => e.stopPropagation());
    del2.addEventListener('click', (e) => {
      e.stopPropagation();
      selectedCellIds.delete(cell.id);
      if (selectedCellId === cell.id) {
        selectedCellId = null; activeCellEl = null;
        document.getElementById('free-cell-inspector').classList.add('no-selection');
        document.getElementById('fci-title').textContent = 'パネルを選択';
        document.getElementById('free-detail-bar').innerHTML = '<span class="fdb-placeholder">-</span>';
      }
      freeCells = freeCells.filter(c => c.id !== cell.id);
      buildFreeEditor();
    });
    tb.appendChild(lbl); tb.appendChild(del2);
    el.appendChild(tb);
    applyFreeCellTextOverlay(el, cell);
  } else {
    // 通常セル: 席セレクト＋テキスト入力＋削除
    const sel = document.createElement('select');
    sel.className = 'free-cell-seat-sel';
    sel.innerHTML = buildSeatOptions(cell.seatId);

    sel.addEventListener('change', (e) => {
      e.stopPropagation();
      removePreviewCanvas(previewC);
      cell.seatId = sel.value || null;
      el.classList.toggle('fc-has-seat', !!cell.seatId);
      if (cell.seatId) {
        addPreviewCanvas(String(cell.seatId), previewC);
        const _s = seats.get(String(cell.seatId));
        if (_s) requestAnimationFrame(() => drawPreviewCanvas(previewC, _s));
      } else {
        previewC.getContext('2d').clearRect(0, 0, previewC.width, previewC.height);
      }
      if (selectedCellId === cell.id) updateInspector(cell);
    });
    const del = document.createElement('button');
    del.className = 'free-cell-del';
    del.textContent = '✕';
    del.addEventListener('mousedown', (e) => e.stopPropagation());
    del.addEventListener('click', (e) => {
      e.stopPropagation();
      selectedCellIds.delete(cell.id);
      if (selectedCellId === cell.id) {
        selectedCellId = null; activeCellEl = null;
        document.getElementById('free-cell-inspector').classList.add('no-selection');
        document.getElementById('fci-title').textContent = 'パネルを選択';
        document.getElementById('free-detail-bar').innerHTML = '<span class="fdb-placeholder">-</span>';
      }
      freeCells = freeCells.filter(c => c.id !== cell.id);
      buildFreeEditor();
    });
    tb.appendChild(sel); tb.appendChild(del);
    el.appendChild(tb);
    applyFreeCellTextOverlay(el, cell);
  }

  const badge = document.createElement('div');
  badge.className = 'free-cell-pos-badge';
  badge.textContent = toPxX(cell.w) + 'x' + toPxY(cell.h) + 'px';
  el.appendChild(badge);

  for (const dir of ['nw','n','ne','e','se','s','sw','w']) {
    const rh = document.createElement('div');
    rh.className = 'rh rh-' + dir;
    rh.addEventListener('mousedown', (e) => {
      e.preventDefault(); e.stopPropagation();
      selectFreeCell(cell, el);
      startFreeResize(e, cell, dir, el);
    });
    el.appendChild(rh);
  }

  el.addEventListener('mousedown', (e) => {
    if (e.target.classList.contains('rh') || e.target.closest('.free-cell-del') || e.target.tagName === 'SELECT') return;
    e.preventDefault();
    if (e.shiftKey) {
      // Shift+クリック: 追加選択 or 選択解除
      if (selectedCellIds.has(cell.id)) {
        // 既選択なら解除
        el.classList.remove('selected', 'multi-selected');
        selectedCellIds.delete(cell.id);
        if (selectedCellId === cell.id) {
          // primaryを別のセルに移す
          const next = [...selectedCellIds][0];
          if (next !== undefined) {
            const nc = freeCells.find(c => c.id === next);
            const ne = document.querySelector('[data-cell-id="' + next + '"]');
            if (nc && ne) selectFreeCell(nc, ne, true);
          } else {
            selectedCellId = null; activeCellEl = null;
          }
        }
        return; // 解除後はドラッグしない
      } else {
        if (selectedCellIds.size === 0) {
          selectFreeCell(cell, el, false);
        } else {
          el.classList.add('multi-selected');
          selectedCellIds.add(cell.id);
        }
      }
    } else {
      // 通常クリック: クリックしたセルが既に複数選択の一部なら選択を維持したままドラッグ
      if (selectedCellIds.has(cell.id) && selectedCellIds.size > 1) {
        // primary セルだけ更新（選択をクリアしない）
        if (selectedCellId !== cell.id) {
          if (activeCellEl) { activeCellEl.classList.remove('selected'); activeCellEl.classList.add('multi-selected'); }
          activeCellEl = el;
          selectedCellId = cell.id;
          el.classList.remove('multi-selected');
          el.classList.add('selected');
          updateInspector(cell);
          updateAnchorHandle(el);
        }
      } else {
        // 未選択セルをクリック → 単独選択
        selectFreeCell(cell, el);
      }
    }
    startFreeMove(e, cell, el);
  });

  // テキスト専用セル: ダブルクリックで直接編集
  if (cell.textOnly) {
    el.addEventListener('dblclick', (e) => {
      e.preventDefault(); e.stopPropagation();
      const wrap = el.querySelector('.free-cell-text-wrap');
      const lbl  = el.querySelector('.free-cell-text-label');
      if (!wrap || !lbl) return;
      // textarea をオーバーレイして編集
      const ta = document.createElement('textarea');
      ta.value = cell.text || '';
      ta.style.cssText = `
        position:absolute; inset:0; z-index:20;
        width:100%; height:100%;
        background: rgba(0,0,10,0.55);
        color:${cell.textColor || '#fff'};
        font-size:${lbl.style.fontSize || '1em'};
        font-weight: bold;
        border: 2px solid #f59e0b;
        border-radius: 0;
        resize: none; outline: none; padding: 4px 8px;
        text-align:${cell.textHAlign || 'center'};
        display: flex; align-items: center;
        box-sizing: border-box;
        line-height: 1.3;
      `;
      el.appendChild(ta);
      ta.focus();
      ta.select();
      ta.addEventListener('input', () => {
        cell.text = ta.value;
        lbl.textContent = ta.value;
      });
      const finish = () => {
        ta.remove();
        applyFreeCellTextOverlay(el, cell);
      };
      ta.addEventListener('blur', finish, { once: true });
      ta.addEventListener('keydown', (ev) => {
        if (ev.key === 'Escape') { ta.blur(); }
        if (ev.key === 'Enter' && !ev.shiftKey) { ev.preventDefault(); ta.blur(); }
      });
    });
  }

  canvas.appendChild(el);
}

function startFreeMove(e, cell, el) {
  const rect = getFreeCanvasRect();
  const sx = e.clientX, sy = e.clientY;
  // 複数選択されている場合は全セルの元位置を記録
  const origins = new Map();
  const moveIds = selectedCellIds.size > 1 ? new Set(selectedCellIds) : new Set([cell.id]);
  for (const id of moveIds) {
    const c = freeCells.find(c => c.id === id);
    if (c) origins.set(id, { x: c.x, y: c.y });
  }
  if (!origins.has(cell.id)) origins.set(cell.id, { x: cell.x, y: cell.y });
  const onMove = (ev) => {
    const dx = (ev.clientX - sx) / rect.width  * 100;
    const dy = (ev.clientY - sy) / rect.height * 100;
    for (const [id, origin] of origins) {
      const c = freeCells.find(c => c.id === id);
      if (!c) continue;
      c.x = Math.max(0, Math.min(100 - c.w, origin.x + dx));
      c.y = Math.max(0, Math.min(100 - c.h, origin.y + dy));
      const domEl = document.querySelector('[data-cell-id="' + id + '"]');
      if (domEl) { domEl.style.left = c.x + '%'; domEl.style.top = c.y + '%'; updatePosBadge(domEl, c); }
    }
    if (selectedCellId === cell.id) updateInspector(cell);
  };
  const onUp = () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);
}

function startFreeResize(e, cell, dir, el) {
  const rect = getFreeCanvasRect();
  const sx = e.clientX, sy = e.clientY;
  const snap = { x: cell.x, y: cell.y, w: cell.w, h: cell.h };
  const MIN_W = fromPxX(10), MIN_H = fromPxY(10);
  const snapAR = aspectLockEnabled ? (toPxX(snap.w) / toPxY(snap.h)) : null;
  const hasHoriz = dir.includes('e') || dir.includes('w');
  const onMove = (ev) => {
    const dx = (ev.clientX - sx) / rect.width  * 100;
    const dy = (ev.clientY - sy) / rect.height * 100;
    if (snapAR !== null) {
      if (hasHoriz) {
        let new_w = dir.includes('e')
          ? Math.max(MIN_W, Math.min(100 - snap.x, snap.w + dx))
          : Math.max(MIN_W, snap.w - dx);
        if (dir.includes('w')) cell.x = Math.max(0, snap.x + snap.w - new_w);
        cell.w = new_w;
        cell.h = Math.min(100 - snap.y, fromPxY(Math.max(10, Math.round(toPxX(new_w) / snapAR))));
        if (dir.includes('n')) cell.y = Math.max(0, snap.y + snap.h - cell.h);
      } else {
        let new_h = dir.includes('s')
          ? Math.max(MIN_H, Math.min(100 - snap.y, snap.h + dy))
          : Math.max(MIN_H, snap.h - dy);
        if (dir.includes('n')) cell.y = Math.max(0, snap.y + snap.h - new_h);
        cell.h = new_h;
        cell.w = Math.min(100 - snap.x, fromPxX(Math.max(10, Math.round(toPxY(new_h) * snapAR))));
      }
    } else {
      if (dir.includes('e')) cell.w = Math.max(MIN_W, Math.min(100 - snap.x, snap.w + dx));
      if (dir.includes('s')) cell.h = Math.max(MIN_H, Math.min(100 - snap.y, snap.h + dy));
      if (dir.includes('w')) {
        const nw = Math.max(MIN_W, snap.w - dx);
        cell.x = Math.max(0, snap.x + snap.w - nw); cell.w = nw;
      }
      if (dir.includes('n')) {
        const nh = Math.max(MIN_H, snap.h - dy);
        cell.y = Math.max(0, snap.y + snap.h - nh); cell.h = nh;
      }
    }
    el.style.left = cell.x+'%'; el.style.top = cell.y+'%';
    el.style.width = cell.w+'%'; el.style.height = cell.h+'%';
    updatePosBadge(el, cell);
    if (selectedCellId === cell.id) updateInspector(cell);
  };
  const onUp = () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);
}

function selectFreeCell(cell, el, addToSelection = false, skipClear = false) {
  if (!addToSelection && !skipClear) {
    // 既存の複数選択をすべて解除
    document.querySelectorAll('.free-cell.multi-selected')
      .forEach(e => e.classList.remove('multi-selected'));
    selectedCellIds.clear();
    if (activeCellEl) activeCellEl.classList.remove('selected');
  } else if (!skipClear) {
    if (activeCellEl) activeCellEl.classList.remove('selected');
  } else {
    // skipClear: buildFreeEditor の再選択時 — multi-selected は別途処理
    if (activeCellEl) activeCellEl.classList.remove('selected');
  }
  selectedCellId = cell.id;
  activeCellEl = el;
  el.classList.add('selected');
  el.classList.remove('multi-selected');
  selectedCellIds.add(cell.id);
  updateInspector(cell);
  updateAnchorHandle(el);
}

// ── テキストオーバーレイのプレビュー更新 ──
function applyFreeCellTextOverlay(el, cell) {
  let wrap = el.querySelector('.free-cell-text-wrap');
  if (!wrap) {
    wrap = document.createElement('div');
    wrap.className = 'free-cell-text-wrap';
    const lbl = document.createElement('div');
    lbl.className = 'free-cell-text-label';
    wrap.appendChild(lbl);
    el.appendChild(wrap);
  }
  const lbl = wrap.querySelector('.free-cell-text-label');
  if (!cell.text) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'flex';
  lbl.textContent = cell.text;
  lbl.style.color = cell.textColor || '#ffffff';
  lbl.style.backgroundColor = cell.textBg || 'rgba(0,0,0,0.55)';
  lbl.style.textAlign = cell.textHAlign || 'left';
  const vMap = { top: 'flex-start', center: 'center', bottom: 'flex-end' };
  const hMap = { left: 'flex-start', center: 'center', right: 'flex-end' };
  wrap.style.justifyContent = vMap[cell.textVAlign || 'bottom'];
  lbl.style.alignSelf = hMap[cell.textHAlign || 'left'];

  // textOnly パネル: キャンバスのスケール比でフォントサイズを合わせる
  if (cell.textOnly) {
    const freeCanvas = document.getElementById('free-canvas');

    lbl.style.fontWeight = 'bold';
    lbl.style.lineHeight = '1.3';
    wrap.style.padding = '4px';
  }
}

// buildFreeEditor()を呼ばずDOM直接更新することで、
// 同値入力時にchangeが発火しなくなる問題を回避する
for (const key of ['x','y','w','h']) {
  document.getElementById('fci-' + key).addEventListener('change', () => {
    if (selectedCellId === null) return;
    const cell = freeCells.find(c => c.id === selectedCellId);
    if (!cell) return;
    const px = parseInt(document.getElementById('fci-' + key).value, 10);
    if (isNaN(px)) return;
    const old_w_px = toPxX(cell.w), old_h_px = toPxY(cell.h);
    if (key === 'w') {
      const nw = Math.max(10, Math.min(DISP_W, px));
      const [ax] = ANCHOR_FACTORS[anchorPoint];
      const anchorXpx = toPxX(cell.x) + ax * old_w_px;
      cell.w = fromPxX(nw);
      if (aspectLockEnabled && old_w_px > 0) cell.h = fromPxY(Math.max(10, Math.round(nw * old_h_px / old_w_px)));
      cell.x = Math.max(0, Math.min(fromPxX(DISP_W - nw), fromPxX(anchorXpx - ax * nw)));
    } else if (key === 'h') {
      const nh = Math.max(10, Math.min(DISP_H, px));
      const [, ay] = ANCHOR_FACTORS[anchorPoint];
      const anchorYpx = toPxY(cell.y) + ay * old_h_px;
      cell.h = fromPxY(nh);
      if (aspectLockEnabled && old_h_px > 0) cell.w = fromPxX(Math.max(10, Math.round(nh * old_w_px / old_h_px)));
      cell.y = Math.max(0, Math.min(fromPxY(DISP_H - nh), fromPxY(anchorYpx - ay * nh)));
    } else if (key === 'x') {
      const [nx] = displayToTopLeft(px, toPxY(cell.y) + ANCHOR_FACTORS[anchorPoint][1] * toPxY(cell.h), cell);
      cell.x = Math.max(0, Math.min(fromPxX(DISP_W - toPxX(cell.w)), nx));
    } else {
      const [, ny] = displayToTopLeft(toPxX(cell.x) + ANCHOR_FACTORS[anchorPoint][0] * toPxX(cell.w), px, cell);
      cell.y = Math.max(0, Math.min(fromPxY(DISP_H - toPxY(cell.h)), ny));
    }
    // セル要素の位置・サイズをDOMで直接更新（再構築しない）
    const el = activeCellEl || document.querySelector('[data-cell-id="' + cell.id + '"]');
    if (el) {
      el.style.left   = cell.x + '%';
      el.style.top    = cell.y + '%';
      el.style.width  = cell.w + '%';
      el.style.height = cell.h + '%';
      updatePosBadge(el, cell);
      updateAnchorHandle(el);
    }
    updateInspector(cell);
  });
}

// ================================================================
// Save slots (unified: grid + free, 10 slots)
// ================================================================
let _patternsCache = null;

async function fetchPatternsFromServer() {
  try {
    const res = await fetch('/api/layout-patterns');
    const data = await res.json();
    if (Array.isArray(data)) {
      _patternsCache = data;
      localStorage.setItem(PAT_KEY, JSON.stringify(data)); // バックアップ
      return data;
    }
  } catch (e) {
    console.warn('[Patterns] サーバーから読み込み失敗、localStorageを使用', e);
  }
  // フォールバック: localStorage
  try { _patternsCache = JSON.parse(localStorage.getItem(PAT_KEY) || '[]'); }
  catch { _patternsCache = []; }
  return _patternsCache;
}

function loadPatterns() {
  if (_patternsCache !== null) return _patternsCache.slice();
  try { return JSON.parse(localStorage.getItem(PAT_KEY) || '[]'); }
  catch { return []; }
}

async function savePatterns(pats) {
  _patternsCache = pats;
  localStorage.setItem(PAT_KEY, JSON.stringify(pats)); // バックアップ
  try {
    await fetch('/api/layout-patterns', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(pats),
    });
  } catch (e) {
    console.warn('[Patterns] サーバー保存失敗（localStorageには保存済み）', e);
  }
}

function buildSaveSlots() {
  const container = document.getElementById('pattern-slots');
  if (!container) return;
  container.innerHTML = '';
  const pats = loadPatterns();
  while (pats.length < PAT_COUNT) pats.push(null);

  for (let i = 0; i < PAT_COUNT; i++) {
    const slot = pats[i];
    const row = document.createElement('div');
    row.className = 'free-save-row';

    const num = document.createElement('span');
    num.className = 'free-save-num';
    num.textContent = (i + 1) + '.';

    const nameInput = document.createElement('input');
    nameInput.type = 'text';
    nameInput.className = 'free-save-name' + (slot ? ' has-data' : '');
    nameInput.placeholder = 'スロット' + (i + 1);
    if (slot) nameInput.value = slot.name || ('スロット' + (i + 1));
    nameInput.addEventListener('mousedown', e => e.stopPropagation());
    nameInput.addEventListener('click', e => e.stopPropagation());

    const saveBtn = document.createElement('button');
    saveBtn.className = 'free-save-btn free-save-btn-save';
    saveBtn.textContent = '保存';

    const doSave = async () => {
      const current = loadPatterns();
      while (current.length < PAT_COUNT) current.push(null);
      const name = nameInput.value.trim() || ('スロット' + (i + 1));
      if (layoutMode === 'grid') {
        current[i] = { name, mode: 'grid', rows: layoutRows, cols: layoutCols, cells: cellAssignments.slice() };
      } else {
        current[i] = { name, mode: 'free', freeCells: freeCells.map(c => Object.assign({}, c)), bgUrl: freeBgUrl || null };
      }
      await savePatterns(current);
      saveBtn.textContent = '✓';
      saveBtn.style.background = '#065f46';
      setTimeout(() => { buildSaveSlots(); }, 400);
    };

    saveBtn.addEventListener('click', () => {
      const current = loadPatterns();
      while (current.length < PAT_COUNT) current.push(null);
      if (current[i] !== null) {
        const existName = current[i].name || ('スロット' + (i + 1));
        lcConfirm('「' + existName + '」を上書き保存しますか？', 'overwrite', doSave);
      } else {
        doSave();
      }
    });

    const modeBadge = document.createElement('span');
    if (slot) {
      modeBadge.className = 'slot-mode-badge ' + (slot.mode === 'free' ? 'badge-free' : 'badge-grid');
      modeBadge.textContent = slot.mode === 'free' ? 'フリー' : 'グリッド';
    }

    const loadBtn = document.createElement('button');
    loadBtn.className = 'free-save-btn free-save-btn-load';
    loadBtn.textContent = '読込';
    loadBtn.disabled = !slot;
    loadBtn.addEventListener('click', () => {
      const current = loadPatterns();
      const p = current[i];
      if (!p) return;
      if (p.mode === 'free') {
        setLayoutMode('free');
        freeCells = (p.freeCells || []).map(c => Object.assign({}, c, { id: ++freeCellIdCounter }));
        freeBgUrl = p.bgUrl || null;
        updateCanvasBg();
        refreshBgPickerSelection();
        buildFreeEditor();
        loadBgPicker();
      } else {
        setLayoutMode('grid');
        layoutRows = p.rows || 2; layoutCols = p.cols || 3;
        cellAssignments = (p.cells || []).slice();
        document.getElementById('rows').value = layoutRows;
        document.getElementById('cols').value = layoutCols;
        buildPresets();
        buildGridPreview();
      }
    });

    const delBtn = document.createElement('button');
    delBtn.className = 'free-save-btn free-save-btn-del';
    delBtn.textContent = '削除';
    delBtn.disabled = !slot;

    delBtn.addEventListener('click', () => {
      const existName = slot ? (slot.name || ('スロット' + (i + 1))) : ('スロット' + (i + 1));
      lcConfirm('「' + existName + '」を削除しますか？', 'delete', async () => {
        const current = loadPatterns();
        while (current.length < PAT_COUNT) current.push(null);
        current[i] = null;
        await savePatterns(current);
        buildSaveSlots();
      });
    });

    row.appendChild(num);
    row.appendChild(nameInput);
    if (slot) row.appendChild(modeBadge);
    row.appendChild(saveBtn);
    row.appendChild(loadBtn);
    row.appendChild(delBtn);
    container.appendChild(row);
  }
}

// ================================================================
// Canvas draw helpers
// ================================================================
function invertColor(hex) {
  if (!hex || hex[0] !== '#' || hex.length !== 7) return hex;
  const r = 255 - parseInt(hex.slice(1, 3), 16);
  const g = 255 - parseInt(hex.slice(3, 5), 16);
  const b = 255 - parseInt(hex.slice(5, 7), 16);
  return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
}
function drawStrokeSegment(canvas, ctx, stroke, inv = false) {
  const pts = stroke.points;
  if (pts.length < 2) return;
  const dpr = window.devicePixelRatio || 1;
  const dispW = canvas.width / dpr, dispH = canvas.height / dpr;
  const scaleX = stroke.srcW ? dispW / stroke.srcW : 1;
  const scaleY = stroke.srcH ? dispH / stroke.srcH : 1;
  ctx.save();
  if (stroke.tool === 'eraser') {
    ctx.globalCompositeOperation = 'destination-out'; ctx.strokeStyle = 'rgba(0,0,0,1)';
  } else {
    ctx.globalCompositeOperation = 'source-over'; ctx.strokeStyle = inv ? invertColor(stroke.color) : stroke.color;
  }
  ctx.lineWidth = Math.max(1, stroke.size * Math.min(scaleX, scaleY));
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.beginPath();
  if (pts.length === 2) {
    ctx.moveTo(pts[0].x * scaleX, pts[0].y * scaleY);
    ctx.lineTo(pts[1].x * scaleX, pts[1].y * scaleY);
  } else {
    const pp = pts[pts.length - 3], p = pts[pts.length - 2], c = pts[pts.length - 1];
    ctx.moveTo((pp.x + p.x) / 2 * scaleX, (pp.y + p.y) / 2 * scaleY);
    ctx.quadraticCurveTo(p.x * scaleX, p.y * scaleY,
      (p.x + c.x) / 2 * scaleX, (p.y + c.y) / 2 * scaleY);
  }
  ctx.stroke(); ctx.restore();
}

function drawStrokeOnCanvas(canvas, ctx, stroke, inv = false) {
  if (!stroke.points || stroke.points.length < 1) return;
  const dpr = window.devicePixelRatio || 1;
  const dispW = canvas.width / dpr, dispH = canvas.height / dpr;
  const scaleX = stroke.srcW ? dispW / stroke.srcW : 1;
  const scaleY = stroke.srcH ? dispH / stroke.srcH : 1;
  ctx.save();
  if (stroke.tool === 'eraser') {
    ctx.globalCompositeOperation = 'destination-out'; ctx.strokeStyle = 'rgba(0,0,0,1)';
  } else {
    ctx.globalCompositeOperation = 'source-over'; ctx.strokeStyle = inv ? invertColor(stroke.color) : stroke.color;
  }
  ctx.lineWidth = Math.max(1, stroke.size * Math.min(scaleX, scaleY));
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(stroke.points[0].x * scaleX, stroke.points[0].y * scaleY);
  for (let i = 1; i < stroke.points.length; i++) {
    const prev = stroke.points[i - 1], curr = stroke.points[i];
    ctx.quadraticCurveTo(prev.x * scaleX, prev.y * scaleY,
      (prev.x + curr.x) / 2 * scaleX, (prev.y + curr.y) / 2 * scaleY);
  }
  ctx.stroke(); ctx.restore();
}

function redrawCanvas(seat) {
  const dpr = window.devicePixelRatio || 1;
  const w = seat.canvas.width / dpr, h = seat.canvas.height / dpr;
  seat.ctx.clearRect(0, 0, w, h);
  seat.ctx.save(); seat.ctx.globalCompositeOperation = 'source-over';
  seat.ctx.fillStyle = '#ffffff'; seat.ctx.fillRect(0, 0, w, h); seat.ctx.restore();
  if (seat.bgImage) {
    const img = seat.bgImage;
    const scale = Math.max(w / img.naturalWidth, h / img.naturalHeight);
    const dw = img.naturalWidth * scale, dh = img.naturalHeight * scale;
    seat.ctx.drawImage(img, (w - dw) / 2, (h - dh) / 2, dw, dh);
  }
  if (seat.fillImg) {
    seat.ctx.drawImage(seat.fillImg, 0, 0, w, h);
  }
  const inv = lcJudgeColorMode && seat.judging;
  for (const s of seat.strokes) drawStrokeOnCanvas(seat.canvas, seat.ctx, s, inv);
  updateSeatPreviews(seat);
}

    '</div>' +
    '<div class="seat-cw" id="lc-cw-' + id + '">' +
      '<canvas class="seat-canvas" id="lc-cv-' + id + '"></canvas>' +
      '<div class="seat-placeholder">待機中</div>' +
      '<div class="lc-choice-overlay"><img alt=""></div>' +
      '<div class="lc-judge-overlay"><img alt=""></div>' +
    '</div>';
  grid.appendChild(card);

  const canvas = document.getElementById('lc-cv-' + id);
  const ctx    = canvas.getContext('2d');
  const seat   = { id, canvas, ctx, strokes: [], bgImage: null, bgImageUrl: '', fillImg: null, judgeOverlayUrl: null, connected: false, name: seatData.name || id };
  seats.set(id, seat);

  const ro = new ResizeObserver(() => {
    const wrap = document.getElementById('lc-cw-' + id);
    if (!wrap) return;
    const dpr = window.devicePixelRatio || 1;
    const w = wrap.clientWidth, h = wrap.clientHeight;
    canvas.width  = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
    ctx.setTransform(1, 0, 0, 1, 0, 0); ctx.scale(dpr, dpr);
    redrawCanvas(seat);
  });
  ro.observe(card);
  return seat;
}

function updateSeat(seatData) {
  const id    = String(seatData.seatId);
  const empty = document.getElementById('empty-msg');
  if (!seats.has(id)) {
    createSeatCard(id, seatData);
    if (empty) empty.style.display = 'none';
    buildGridPreview();
    if (layoutMode === 'free') buildFreeEditor();
  }
  const seat = seats.get(id);
  seat.connected = seatData.connected;
  seat.name = seatData.name || id;
  const card = document.getElementById('lc-card-' + id);
  if (card) card.classList.toggle('connected', !!seatData.connected);
  const num = document.getElementById('lc-num-' + id);
  if (num) num.classList.toggle('on', !!seatData.connected);
  const nameEl = document.getElementById('lc-name-' + id);
  if (nameEl) nameEl.textContent = seatData.name || '-';
  const newBg = seatData.bgImageUrl || '';
  if (newBg !== seat.bgImageUrl) {
    seat.bgImageUrl = newBg;
    if (newBg) {
      const img = new Image(); img.onload = () => { seat.bgImage = img; redrawCanvas(seat); }; img.src = newBg;
    } else { seat.bgImage = null; }
  }
  if (seatData.strokes && seatData.strokes.length > 0) {
    seat.strokes = seatData.strokes.slice(); redrawCanvas(seat);
  }
}

// ================================================================
// Socket
// ================================================================
function connect() {
  socket = io();
  socket.on('connect', () => {
    document.getElementById('conn-dot').textContent = '● 接続済み';
    document.getElementById('conn-dot').className = 'ok';
    socket.emit('register-host');
  });
  socket.on('disconnect', () => {
    document.getElementById('conn-dot').textContent = '× 切断';
    document.getElementById('conn-dot').className = '';
  });
  socket.on('full-state', (state) => {
    if (typeof state.judgeColorMode !== 'undefined') lcJudgeColorMode = !!state.judgeColorMode;
    for (const s of state.seats) updateSeat(s);
  });
  socket.on('stroke-start', ({ seatId, stroke }) => {
    const id = String(seatId);
    currentStrokes.set(id, Object.assign({}, stroke, { points: (stroke.points || []).slice() }));
    const seat = seats.get(id);
    if (seat) {
      drawStrokeOnCanvas(seat.canvas, seat.ctx, currentStrokes.get(id));
      updateSeatPreviews(seat); // コミット済みストローク+背景でリセット
      updateSeatPreviewsSegment(seat, currentStrokes.get(id)); // ライブストローク初期描画
    }
  });
  socket.on('stroke-point', ({ seatId, point }) => {
    const id = String(seatId);
    const stroke = currentStrokes.get(id);
    if (!stroke) return;
    stroke.points.push(point);
    const seat = seats.get(id);
    if (seat) {
      drawStrokeSegment(seat.canvas, seat.ctx, stroke);
      updateSeatPreviewsSegment(seat, stroke); // 差分のみ描画（フルリドロー不要）
    }
  });
  socket.on('stroke-end', ({ seatId }) => {
    const id = String(seatId);
    const stroke = currentStrokes.get(id);
    if (!stroke) return;
    const seat = seats.get(id);
    if (seat) { seat.strokes.push(stroke); updateSeatPreviews(seat); }
    currentStrokes.delete(id);
  });
  socket.on('canvas-cleared', ({ seatId }) => {
    const seat = seats.get(String(seatId));
    if (!seat) return;
    seat.strokes = []; currentStrokes.delete(String(seatId));
    seat.judging = false; seat.fillImg = null;
    redrawCanvas(seat);
    clearLcJudgeOverlay(seatId);
  });
  socket.on('seat-strokes-updated', ({ seatId, strokes }) => {
    const seat = seats.get(String(seatId));
    if (!seat) return;
    seat.strokes = strokes; redrawCanvas(seat);
  });
  socket.on('show-choice', ({ imageUrl }) => {
    if (imageUrl) applyLcChoice(imageUrl); else clearLcChoice();
  });
  socket.on('clear-choice', () => { clearLcChoice(); });
  socket.on('judge-result', ({ seatId, imageUrl }) => {
    const id   = String(seatId);
    const seat = seats.get(id);
    if (!seat) return;
    // ファイル名に "fill" が含まれる場合はキャンバスに塗り込む（判定色）
    const isFill = /fill/i.test(imageUrl.split('/').pop());
    if (isFill) {
      seat.judging = true;
      clearLcJudgeOverlay(seatId);
      const img = new Image();
      img.onload = () => { seat.fillImg = img; redrawCanvas(seat); updateSeatPreviews(seat); };
      img.src = imageUrl;
    } else {
      seat.judging = true;
      seat.fillImg = null; redrawCanvas(seat); updateSeatPreviews(seat);
      applyLcJudgeOverlay(seatId, imageUrl);
    }
  });
  socket.on('clear-overlay', (data) => {
    const clearOne = (id) => {
      const seat = seats.get(String(id));
      if (!seat) return;
      seat.judging = false; seat.fillImg = null; redrawCanvas(seat); updateSeatPreviews(seat);
      clearLcJudgeOverlay(id);
    };
    if (data?.seatId) clearOne(data.seatId);
    else for (const id of seats.keys()) clearOne(id);
  });
  socket.on('judge-color-mode', ({ enabled }) => {
    lcJudgeColorMode = !!enabled;
    for (const seat of seats.values()) redrawCanvas(seat);
  });
}

// カスタム確認モーダル（confirm() の代替 — Electron でフォーカスを失わない）
(function() {
  const overlay  = document.getElementById('lc-confirm-overlay');
  const msgEl    = document.getElementById('lc-confirm-msg');
  const yesBtn   = document.getElementById('lc-confirm-yes');
  const noBtn    = document.getElementById('lc-confirm-no');
  let _resolve = null;

  window.lcConfirm = function(message, type, onYes) {
    msgEl.textContent = message;
    // typeによってはいボタンの色を変える
    if (type === 'delete') {
      yesBtn.style.background = 'linear-gradient(180deg,#dc2626,#b91c1c)';
      yesBtn.style.color = '#fff';
    } else {
      yesBtn.style.background = 'linear-gradient(180deg,#059669,#047857)';
      yesBtn.style.color = '#fff';
    }
    overlay.classList.add('show');
    _resolve = onYes;
  };

  yesBtn.addEventListener('click', () => {
    overlay.classList.remove('show');
    if (_resolve) { _resolve(); _resolve = null; }
  });
  noBtn.addEventListener('click', () => {
    overlay.classList.remove('show');
    _resolve = null;
  });
  // 背景クリックで閉じる
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) { overlay.classList.remove('show'); _resolve = null; }
  });
})();

buildPresets();
buildGridPreview();
fetchPatternsFromServer().then(() => buildSaveSlots());
initFreeCanvasRubberBand();
setLayoutMode('grid');
connect();
</script>
